<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <g transform="translate(10, 5) scale(0.55)">
    <!-- Hexagon outline -->
    <polygon points="65,5 120,25 120,85 65,105 10,85 10,25" fill="none" stroke="#86efac" stroke-width="7" stroke-linejoin="round"/>
    <!-- Top chevron -->
    <polyline points="35,35 65,20 95,35" fill="none" stroke="#86efac" stroke-width="7" stroke-linejoin="round"/>
    <!-- Middle band -->
    <line x1="10" y1="52" x2="120" y2="52" stroke="#86efac" stroke-width="7"/>
    <!-- Bottom chevron -->
    <polyline points="10,72 65,52 120,72" fill="none" stroke="#86efac" stroke-width="7" stroke-linejoin="round"/>
  </g>
  <!-- DOMO text -->
  <text x="90" y="58" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="40" font-weight="800" fill="#86efac" letter-spacing="3">DOMO</text>
</svg>
